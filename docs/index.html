<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stan's Bar Cup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep:#0d2b1a;--green-dark:#163d26;--green-mid:#1e5c38;--green-bright:#2d8653;--green-light:#4caf76;
    --gold:#c9a84c;--gold-light:#f0d080;--silver:#a8b4b8;--bronze:#b87333;
    --cream:#f5f0e8;--text-light:#8a8a8a;--white:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--green-deep);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(45,134,83,0.18) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 90% 110%,rgba(13,43,26,0.8) 0%,transparent 60%),repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,0.012) 40px,rgba(255,255,255,0.012) 41px);pointer-events:none;z-index:0;}
  .page-wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 20px 60px;}
  .site-header{text-align:center;padding:56px 20px 40px;}
  .header-eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--green-light);margin-bottom:14px;opacity:0.9;}
  .header-title{font-family:'Playfair Display',serif;font-size:clamp(36px,7vw,72px);font-weight:900;line-height:1.0;color:var(--cream);letter-spacing:-1px;text-shadow:0 2px 24px rgba(0,0,0,0.4);}
  .header-title span{color:var(--gold);display:block;}
  .header-meta{margin-top:18px;font-size:13px;color:var(--green-light);font-weight:300;letter-spacing:0.5px;}
  .header-meta strong{color:var(--gold-light);font-weight:500;}
  .tabs{display:flex;justify-content:center;gap:6px;margin:32px 0 28px;flex-wrap:wrap;}
  .tab{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.5px;padding:10px 24px;border-radius:100px;cursor:pointer;transition:all 0.2s;outline:none;}
  .tab:hover{background:rgba(255,255,255,0.12);}
  .tab.active{background:var(--gold);border-color:var(--gold);color:var(--green-deep);font-weight:600;}
  .card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:16px;backdrop-filter:blur(8px);overflow:hidden;}
  .podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:28px;}
  .podium-card{border-radius:14px;padding:24px 16px 20px;text-align:center;position:relative;overflow:hidden;transition:transform 0.2s;}
  .podium-card:hover{transform:translateY(-3px);}
  .podium-card::before{content:'';position:absolute;inset:0;opacity:0.12;background:radial-gradient(circle at 50% 0%,white,transparent 70%);}
  .podium-1{background:linear-gradient(160deg,#3d2800,#1a1000);border:1px solid var(--gold);}
  .podium-2{background:linear-gradient(160deg,#1e2a2e,#0e1518);border:1px solid var(--silver);}
  .podium-3{background:linear-gradient(160deg,#2e1a08,#160d04);border:1px solid var(--bronze);}
  .podium-medal{font-size:28px;display:block;margin-bottom:8px;}
  .podium-pos{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
  .podium-1 .podium-pos{color:var(--gold);}
  .podium-2 .podium-pos{color:var(--silver);}
  .podium-3 .podium-pos{color:var(--bronze);}
  .podium-name{font-family:'Playfair Display',serif;font-size:clamp(15px,2.5vw,20px);font-weight:700;color:var(--cream);margin-bottom:8px;line-height:1.2;}
  .podium-pts{font-size:28px;font-weight:600;color:var(--gold-light);font-family:'DM Mono',monospace;display:block;}
  .podium-sub{font-size:11px;color:var(--text-light);margin-top:4px;}
  .lb-table{width:100%;border-collapse:collapse;}
  .lb-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--green-light);padding:14px 16px;text-align:right;border-bottom:1px solid rgba(255,255,255,0.08);white-space:nowrap;}
  .lb-table th:nth-child(2){text-align:left;}
  .lb-table td{padding:14px 16px;text-align:right;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.05);white-space:nowrap;transition:background 0.15s;}
  .lb-table td:nth-child(2){text-align:left;}
  .lb-table tr:last-child td{border-bottom:none;}
  .lb-table tbody tr:hover td{background:rgba(255,255,255,0.04);}
  .lb-pos{font-family:'DM Mono',monospace;font-size:13px;color:var(--text-light);font-weight:500;}
  .lb-pos.p1{color:var(--gold);}
  .lb-pos.p2{color:var(--silver);}
  .lb-pos.p3{color:var(--bronze);}
  .lb-name{font-weight:600;font-size:15px;color:var(--cream);}
  .lb-hcp{font-size:12px;color:var(--text-light);margin-top:2px;}
  .lb-pts{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--gold-light);}
  .badge{display:inline-block;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:1px;padding:3px 9px;border-radius:100px;text-transform:uppercase;font-weight:500;}
  .badge-q{background:rgba(76,175,118,0.2);color:var(--green-light);border:1px solid rgba(76,175,118,0.3);}
  .badge-nm{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.25);}
  .win-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);margin-right:3px;vertical-align:middle;}
  .round-card{border-radius:14px;overflow:hidden;margin-bottom:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);}
  .round-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:rgba(255,255,255,0.05);cursor:pointer;user-select:none;transition:background 0.15s;}
  .round-header:hover{background:rgba(255,255,255,0.09);}
  .round-date{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--cream);}
  .round-course{font-size:12px;color:var(--text-light);margin-top:2px;}
  .round-toggle{color:var(--green-light);font-size:20px;transition:transform 0.2s;}
  .round-toggle.open{transform:rotate(180deg);}
  .round-scores{display:none;}
  .round-scores.open{display:block;}
  .score-row{display:grid;grid-template-columns:36px 1fr 58px 58px 58px 58px;align-items:center;padding:10px 20px;border-top:1px solid rgba(255,255,255,0.05);font-size:13px;}
  .score-row:nth-child(even){background:rgba(255,255,255,0.02);}
  .score-place{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--text-light);}
  .score-place.p1{color:var(--gold);}
  .score-name{font-weight:500;color:var(--cream);}
  .score-val{text-align:right;font-family:'DM Mono',monospace;color:var(--cream);}
  .score-net{text-align:right;font-family:'DM Mono',monospace;color:var(--gold-light);font-weight:600;}
  .score-pts{text-align:right;font-family:'DM Mono',monospace;color:var(--green-light);font-size:12px;}
  .score-col-hdr{display:grid;grid-template-columns:36px 1fr 58px 58px 58px 58px;padding:8px 20px;background:rgba(0,0,0,0.2);border-top:1px solid rgba(255,255,255,0.06);}
  .score-col-hdr span{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--green-light);text-align:right;}
  .score-col-hdr span:nth-child(2){text-align:left;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;}
  .stat-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:12px;padding:20px;text-align:center;}
  .stat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);font-family:'DM Mono',monospace;margin-bottom:10px;}
  .stat-value{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--gold);}
  .stat-sub{font-size:12px;color:var(--text-light);margin-top:4px;}
  .state-msg{text-align:center;padding:80px 20px;color:var(--text-light);}
  .state-msg .emoji{font-size:48px;display:block;margin-bottom:16px;}
  .state-msg h3{font-family:'Playfair Display',serif;font-size:22px;color:var(--cream);margin-bottom:8px;}
  .site-footer{text-align:center;padding:32px 20px;font-size:11px;color:rgba(255,255,255,0.2);font-family:'DM Mono',monospace;letter-spacing:1px;}
  @media(max-width:640px){
    .podium{grid-template-columns:1fr;max-width:280px;margin-left:auto;margin-right:auto;}
    .lb-table th:nth-child(n+5),.lb-table td:nth-child(n+5){display:none;}
    .score-row,.score-col-hdr{grid-template-columns:32px 1fr 52px 52px;}
    .score-row>*:nth-child(n+5),.score-col-hdr>*:nth-child(n+5){display:none;}
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  .fade-up{animation:fadeUp 0.5s ease both;}
  .fade-up:nth-child(2){animation-delay:0.07s;}
  .fade-up:nth-child(3){animation-delay:0.14s;}
  .fade-up:nth-child(4){animation-delay:0.21s;}
  .fade-up:nth-child(n+5){animation-delay:0.28s;}
</style>
</head>
